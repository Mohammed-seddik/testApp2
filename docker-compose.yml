services:
  app:
    build: .
    ports:
      - "3002:3001"
    environment:
      - PORT=3001
      - APP_JWT_SECRET=super_secret_jwt_key_123
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=rootpassword
      - DB_NAME=taskdb
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - ztam

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=taskdb
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:


networks:
  ztam:
    name: ztam-platform_ztam
    external: true
